<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Game & Movie Release Calendar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #222;
    }

    .page {
      width: calc(100% - 80px);
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 0;
      box-sizing: border-box;
    }

    @media (max-width: 700px) {
      .page {
        width: calc(100% - 24px);
      }
    }

    h1 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 24px;
    }

    .legend {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      margin-bottom: 14px;
      font-size: 13px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
    }

    .legend-dot.exact {
      background: #d8ecff;
      border: 1px solid #8abce8;
    }

    .legend-dot.window {
      background: #fff2cc;
      border: 1px dashed #c99a00;
    }

    .legend-dot.movie {
      background: #ffd6d6;
      border: 1px solid #d14a4a;
    }

    .calendar-wrap {
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: visible;
    }

    .calendar {
      display: grid;
      grid-template-columns: 60px repeat(7, minmax(0, 1fr));
      grid-template-rows: 36px;
      grid-auto-rows: minmax(120px, auto);
      width: 100%;
      min-width: 0;
    }

    .cell,
    .month-label,
    .day-header,
    .corner {
      border-right: 1px solid #ccc;
      border-bottom: 1px solid #ccc;
      box-sizing: border-box;
      display: flex;
      padding: 8px;
      font-size: 14px;
    }

    .cell {
      align-items: flex-start;
      justify-content: flex-start;
      min-width: 0;
      flex-direction: column;
      gap: 4px;
      overflow: visible;
    }

    .day-header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eee;
      font-weight: bold;
      min-height: 36px;
      align-items: center;
      justify-content: center;
    }

    .corner {
      position: sticky;
      top: 0;
      left: 0;
      z-index: 3;
      background: #eee;
      min-height: 36px;
    }

    .month-label {
      justify-content: center;
      align-items: center;
      font-weight: bold;
      z-index: 1;
      background: #fafafa;
    }

    .month-even {
      background: #ffffff;
    }

    .month-odd {
      background: #e9f1fb;
    }

    .date-number {
      font-weight: bold;
      margin-bottom: 2px;
    }

    .today {
      outline: 3px solid #ff4d4d;
      outline-offset: -3px;
      box-shadow: inset 0 0 0 2px white;
    }

    .today .date-number::after {
      content: " Today";
      font-size: 11px;
      color: #c00000;
      font-weight: bold;
    }

    .event {
      width: 100%;
      box-sizing: border-box;
      border-radius: 5px;
      padding: 4px 5px;
      font-size: 11px;
      line-height: 1.2;
      font-weight: normal;
    }

    .event.game-exact {
      background: #d8ecff;
      border: 1px solid #8abce8;
    }

    .event.game-window {
      background: #fff2cc;
      border: 1px dashed #c99a00;
    }

    .event.movie {
      background: #ffd6d6;
      border: 1px solid #d14a4a;
    }

    .event-title {
      font-weight: bold;
    }

    .event-note {
      margin-top: 2px;
      opacity: 0.8;
    }

    .empty {
      background: #f7f7f7;
      color: #bbb;
    }

    .watchlist {
      margin-top: 20px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
    }

    .watchlist h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .watchlist ul {
      margin: 0;
      padding-left: 20px;
      columns: 2;
      column-gap: 32px;
      font-size: 13px;
      line-height: 1.4;
    }

    .watchlist li {
      break-inside: avoid;
      margin-bottom: 5px;
    }

    .status {
      text-align: center;
      margin-bottom: 12px;
      font-size: 13px;
      color: #666;
    }

    .status.error {
      color: #b00020;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      body {
        background: #f4f4f4;
      }

      .page {
        width: calc(100% - 12px);
        padding: 8px 0;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }

      .legend {
        justify-content: flex-start;
        font-size: 11px;
        gap: 6px 10px;
        margin-bottom: 8px;
      }

      .calendar {
        grid-template-columns: 34px repeat(7, minmax(0, 1fr));
        grid-template-rows: 24px;
        grid-auto-rows: minmax(58px, auto);
      }

      .cell,
      .month-label,
      .day-header,
      .corner {
        padding: 3px;
        font-size: 10px;
      }

      .day-header,
      .corner {
        min-height: 24px;
      }

      .month-label {
        font-size: 10px;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        padding: 4px 2px;
      }

      .cell {
        gap: 2px;
        min-height: 58px;
      }

      .date-number {
        font-size: 10px;
        margin-bottom: 1px;
      }

      .today {
        outline: 2px solid #ff4d4d;
        outline-offset: -2px;
      }

      .today .date-number::after {
        content: "";
      }

      .event {
        padding: 2px 3px;
        font-size: 8.5px;
        line-height: 1.05;
        border-radius: 3px;
      }

      .event-note {
        display: none;
      }

      .watchlist {
        margin-top: 12px;
        padding: 10px;
      }

      .watchlist ul {
        columns: 1;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>2026 Game & Movie Release Calendar</h1>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot exact"></span>Exact game date</div>
      <div class="legend-item"><span class="legend-dot window"></span>Game window / estimate</div>
      <div class="legend-item"><span class="legend-dot movie"></span>Movie</div>
    </div>

    <div id="status" class="status">Loading calendar_events.csv...</div>

    <div class="calendar-wrap">
      <div class="calendar" id="calendar"></div>
    </div>

    <div class="watchlist">
      <h2>2027+ Watchlist</h2>
      <ul id="watchlist"></ul>
    </div>
  </div>

  <script>
    const CSV_FILE = "calendar_events.csv";

    const calendar = document.getElementById("calendar");
    const watchlist = document.getElementById("watchlist");
    const statusBox = document.getElementById("status");

    const monthNames = [
      "Jan", "Feb", "Mar", "Apr", "May", "Jun",
      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
    ];

    const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const year = 2026;
    const startDate = new Date(year, 0, 1);
    const endDate = new Date(year, 11, 31);

    buildHeader();
    buildCalendar();
    loadCsvData();

    async function loadCsvData() {
      try {
        const response = await fetch(`${CSV_FILE}?v=${Date.now()}`);
        if (!response.ok) {
          throw new Error(`Could not load ${CSV_FILE}`);
        }

        const text = await response.text();
        const rows = parseCsv(text);
        const items = rows.map(normalizeRow).filter(Boolean);

        addEvents(items.filter(item => item.section === "calendar"));
        addWatchlist(items.filter(item => item.section === "watchlist"));
        scrollToCurrentWeek();

        statusBox.textContent = "";
        statusBox.style.display = "none";
      } catch (error) {
        statusBox.textContent = `Error loading ${CSV_FILE}. Make sure it is in the same GitHub repo folder as index.html.`;
        statusBox.classList.add("error");
        console.error(error);
      }
    }

    function buildHeader() {
      const corner = document.createElement("div");
      corner.className = "corner";
      corner.style.gridColumn = "1";
      corner.style.gridRow = "1";
      calendar.appendChild(corner);

      dayNames.forEach((dayName, index) => {
        const header = document.createElement("div");
        header.className = "day-header";
        header.textContent = dayName;
        header.style.gridColumn = String(index + 2);
        header.style.gridRow = "1";
        calendar.appendChild(header);
      });
    }

    function buildCalendar() {
      const weeks = [];
      const current = new Date(startDate);
      current.setDate(current.getDate() - current.getDay());

      while (current <= endDate) {
        const weekStart = new Date(current);
        weeks.push({
          start: weekStart,
          monthIndex: getWeekMonthIndex(weekStart)
        });
        current.setDate(current.getDate() + 7);
      }

      addMonthLabels(weeks);
      addDateCells(weeks);
    }

    function addMonthLabels(weeks) {
      let startRow = 2;
      let currentMonth = weeks[0].monthIndex;

      for (let i = 1; i <= weeks.length; i++) {
        const nextMonth = i < weeks.length ? weeks[i].monthIndex : null;

        if (nextMonth !== currentMonth) {
          const endRow = i + 2;
          const label = document.createElement("div");
          label.className = "month-label";
          label.textContent = monthNames[currentMonth];
          label.style.gridColumn = "1";
          label.style.gridRow = `${startRow} / ${endRow}`;
          calendar.appendChild(label);

          startRow = i + 2;
          currentMonth = nextMonth;
        }
      }
    }

    function addDateCells(weeks) {
      weeks.forEach((week, weekIndex) => {
        const gridRow = weekIndex + 2;

        for (let i = 0; i < 7; i++) {
          const day = new Date(week.start);
          day.setDate(week.start.getDate() + i);

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.style.gridColumn = String(i + 2);
          cell.style.gridRow = String(gridRow);

          if (day.getFullYear() !== year) {
            cell.classList.add("empty");
          } else {
            const monthColorClass = day.getMonth() % 2 === 0 ? "month-even" : "month-odd";
            cell.classList.add(monthColorClass);

            const dateNumber = document.createElement("div");
            dateNumber.className = "date-number";
            dateNumber.textContent = day.getDate();
            cell.appendChild(dateNumber);

            cell.dataset.date = formatDate(day);

            if (isToday(day)) {
              cell.classList.add("today");
            }
          }

          calendar.appendChild(cell);
        }
      });
    }

    function addEvents(events) {
      events
        .sort((a, b) => a.date.localeCompare(b.date) || a.title.localeCompare(b.title))
        .forEach(event => {
          const cell = document.querySelector(`[data-date="${event.date}"]`);
          if (!cell) return;

          const eventDiv = document.createElement("div");
          eventDiv.className = `event ${event.type}`;

          const title = document.createElement("div");
          title.className = "event-title";
          title.textContent = event.type === "game-window" ? `~ ${event.title}` : event.title;
          eventDiv.appendChild(title);

          if (event.note) {
            const note = document.createElement("div");
            note.className = "event-note";
            note.textContent = event.note;
            eventDiv.appendChild(note);
          }

          cell.appendChild(eventDiv);
        });
    }

    function addWatchlist(items) {
      items
        .sort((a, b) => Number(a.sort_order || 9999) - Number(b.sort_order || 9999) || a.title.localeCompare(b.title))
        .forEach(item => {
          const li = document.createElement("li");
          li.textContent = item.note ? `${item.title} — ${item.note}` : item.title;
          watchlist.appendChild(li);
        });
    }

    function normalizeRow(row) {
      const section = clean(row.section).toLowerCase();
      const date = clean(row.date);
      const title = clean(row.title);
      const type = clean(row.type).toLowerCase();
      const note = clean(row.note);
      const sort_order = clean(row.sort_order);

      if (!section || !title) return null;
      if (section === "calendar" && !date) return null;

      return {
        section,
        date,
        title,
        type: type || (section === "watchlist" ? "watchlist" : "game-exact"),
        note,
        sort_order
      };
    }

    function parseCsv(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && inQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          currentRow.push(currentValue);
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && nextChar === "\n") i++;
          currentRow.push(currentValue);
          rows.push(currentRow);
          currentRow = [];
          currentValue = "";
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      const cleanedRows = rows.filter(row => row.some(cell => cell.trim() !== ""));
      if (!cleanedRows.length) return [];

      const headers = cleanedRows[0].map(header => header.trim());
      return cleanedRows.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = row[index] || "";
        });
        return obj;
      });
    }

    function getWeekMonthIndex(weekStart) {
      for (let i = 0; i < 7; i++) {
        const day = new Date(weekStart);
        day.setDate(weekStart.getDate() + i);

        if (day.getFullYear() === year) {
          return day.getMonth();
        }
      }
      return 0;
    }

    function scrollToCurrentWeek() {
      const todayCell = document.querySelector(".today");
      if (!todayCell) return;

      requestAnimationFrame(() => {
        todayCell.scrollIntoView({
          behavior: "auto",
          block: "center",
          inline: "nearest"
        });
      });
    }

    function isToday(date) {
      const today = new Date();
      return date.getFullYear() === today.getFullYear() &&
        date.getMonth() === today.getMonth() &&
        date.getDate() === today.getDate();
    }

    function formatDate(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function clean(value) {
      return String(value || "").trim();
    }
  </script>
</body>
</html>
